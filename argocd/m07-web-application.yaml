apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: m07-web
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/dftuil/m07-cicd-gitops.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      enabled: true
      prune: false
      selfHeal: true
